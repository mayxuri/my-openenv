name: customer-support-env
version: "1.0.0"
description: >
  A real-world OpenEnv environment for customer support ticket management.
  AI agents learn to classify, route, and draft responses for support tickets
  with increasing difficulty. Covers billing, technical, account, and general
  ticket categories across three tasks: easy classification, medium routing,
  and hard response drafting.

author: "OpenEnv Submission"

tags:
  - customer-support
  - nlp
  - classification
  - text-generation
  - real-world
  - openenv

tasks:
  - name: classify
    description: >
      Classify an incoming customer support ticket into the correct category
      (billing, technical, account, or general). Graded by exact category match
      with partial credit for adjacent categories.
    difficulty: easy
    max_steps: 3
    reward_range: [0.0, 1.0]

  - name: route
    description: >
      Route a ticket by simultaneously determining: category, priority level
      (low/medium/high/critical), and team assignment. Graded across all three
      dimensions with partial credit for near-correct priority.
    difficulty: medium
    max_steps: 5
    reward_range: [0.0, 1.0]

  - name: respond
    description: >
      Draft a complete, professional, and empathetic customer support response.
      Graded by a deterministic rubric: customer name present, issue acknowledged,
      apology included, resolution steps provided, and appropriate length.
    difficulty: hard
    max_steps: 5
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  description: Current ticket and episode state visible to the agent
  fields:
    ticket:
      type: object
      description: Full customer support ticket
      fields:
        ticket_id:
          type: string
        subject:
          type: string
        body:
          type: string
        customer_name:
          type: string
        account_type:
          type: string
          enum: [free, pro, enterprise]
        created_at:
          type: string
          format: datetime
        previous_tickets:
          type: array
    task_name:
      type: string
      description: Active task identifier
    task_description:
      type: string
      description: Natural-language description of what the agent must do
    available_action_types:
      type: array
      description: Valid action_type values for the current task
    step_count:
      type: integer
      description: Number of steps taken so far in this episode
    max_steps:
      type: integer
      description: Maximum steps allowed before the episode terminates
    feedback:
      type: string
      nullable: true
      description: Textual feedback from the previous step
    cumulative_reward:
      type: number
      description: Sum of all rewards received so far

action_space:
  type: object
  description: Agent action submitted to the environment
  fields:
    action_type:
      type: string
      enum: [submit, ask_clarification]
      required: true
    category:
      type: string
      enum: [billing, technical, account, general]
      required_for: [classify, route]
    priority:
      type: string
      enum: [low, medium, high, critical]
      required_for: [route]
    team:
      type: string
      enum: [billing_team, technical_team, account_team, customer_success]
      required_for: [route]
    response_text:
      type: string
      required_for: [respond]
    reasoning:
      type: string
      description: Optional agent reasoning trace

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Step reward is always in [0.0, 1.0].
    classify: 1.0 exact match, 0.3 adjacent category, 0.0 wrong.
    route: weighted 0.30 category + 0.40 priority + 0.30 team.
    respond: rubric-based — name (0.15) + key words (0.20) + issue (0.25) +
             resolution (0.25) + length (0.15).
    A small efficiency penalty of 0.03 per extra step before submitting is applied.

api:
  reset:
    method: POST
    path: /reset
    body: {task_name: string, seed: integer}
    response: {session_id: string, observation: Observation}
  step:
    method: POST
    path: /step/{session_id}
    body: Action
    response: {observation: Observation, reward: float, done: bool, info: object}
  state:
    method: GET
    path: /state/{session_id}
    response: object
  health:
    method: GET
    path: /health
  tasks:
    method: GET
    path: /tasks
